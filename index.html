<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drain Blockage Monitor</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    .alert { color: red; font-weight: bold; }
    .card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
  </style>
</head>
<body>

  <h1>🚨 Drain Blockage Monitor</h1>
  <div id="alerts"></div>

  <script>
    // Supabase config
    const SUPABASE_URL = "https://elivfvxqhjyyuowzerjz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsaXZmdnhxaGp5eXVvd3plcmp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MzUyMTAsImV4cCI6MjA4OTQxMTIxMH0.ATMoPvOnSGpqbCHfN6Gt7nUaFJTDIxz1bwMxG68oLv4";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Call serverless function to send Telegram
    async function sendTelegram(location) {
      try {
        await fetch("/api/notify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ location })
        });
      } catch (err) {
        console.error("Telegram error:", err);
      }
    }

    // Fetch alerts from Supabase
    async function fetchAlerts() {
      const { data, error } = await supabaseClient
        .from('alerts')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        console.error("Error fetching:", error);
        return;
      }

      const container = document.getElementById('alerts');
      container.innerHTML = '';

      data.forEach(alert => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <p class="alert">⚠️ Blockage Detected!</p>
          <p><strong>Location:</strong> ${alert.location}</p>
          <p><strong>Time:</strong> ${new Date(alert.created_at).toLocaleString()}</p>
        `;
        container.appendChild(div);
      });
    }

    // Real-time listener for new alerts
    supabaseClient
      .channel('alerts-channel')
      .on(
        'postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'alerts' },
        payload => {
          const location = payload.new.location;
          alert("🚨 New blockage detected at " + location);
          fetchAlerts();
          sendTelegram(location); // call serverless function
        }
      )
      .subscribe();

    // Initial load
    fetchAlerts();
  </script>

</body>
</html>
